name: "PR Body Check"

on:
  pull_request:
    types: [opened, reopened, edited, ready_for_review]
    branches: [release]

jobs:
  check:
    name: PR Body Check
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          WARNINGS=0
          ERRORS=0

          warn() { echo "::warning::$1"; ((WARNINGS++)) || true; }
          err()  { echo "::error::$1";   ((ERRORS++))   || true; }

          if [ -z "$PR_BODY" ]; then
            err "PR body is empty. Please use the PR template."
            exit 1
          fi

          # Check required sections exist and aren't just the template placeholder
          check_section() {
            local heading="$1"

            if ! echo "$PR_BODY" | grep -q "## ${heading}"; then
              err "Missing section: ## ${heading}"
              return
            fi

            # Extract content between this heading and the next heading (or EOF)
            local content
            content=$(echo "$PR_BODY" | sed -n "/## ${heading}/,/^## /p" | tail -n +2 | sed '/^## /d')

            # Strip HTML comments and whitespace
            local stripped
            stripped=$(echo "$content" | sed 's/<!--.*-->//g' | tr -d '[:space:]')

            if [ -z "$stripped" ]; then
              warn "Section '## ${heading}' appears empty (only template comments)"
            fi
          }

          check_section "About the PR"
          check_section "Why / Balance"

          # Check changelog if present.
          # The template ships :cl: uncommented; authors delete the block for non-player-facing PRs.
          # If the block is present, at least one entry must be filled in.
          CL_UNCOMMENTED=$(echo "$PR_BODY" | grep -v '^\s*<!--' | grep -c ':cl:' || true)

          if [ "$CL_UNCOMMENTED" -gt 0 ]; then
            CL_FILLED=$(echo "$PR_BODY" | grep -cE '^\s*-\s+(add|tweak|fix|remove):\s+\S' || true)
            if [ "$CL_FILLED" -eq 0 ]; then
              warn "Changelog (:cl:) is present but all entries are empty. Fill them in or remove the :cl: block if this PR has no player-facing changes."
            fi
          fi

          echo ""
          echo "PR body check: ${ERRORS} error(s), ${WARNINGS} warning(s)"

          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi
