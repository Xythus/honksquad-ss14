name: HONK / C# audit (PR)

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [release]

jobs:
  audit:
    name: HONK C# audit
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Fetch upstream/stable mirror
        run: git fetch --no-tags --depth=1 origin upstream/stable

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan for upstream C# drift introduced by this PR
        run: |
          python3 scripts/honk/cs_audit.py \
            --pr-mode origin/${{ github.base_ref }} \
            --fork-ref HEAD \
            --upstream-ref origin/upstream/stable
