name: Report an issue
description: For issues that are not related to any other issue form.
body:
  - type: markdown
    attributes:
      value: |
        Use this template for bugs and issues that don't fit the other forms.
        For general feedback or help, join our [Discord](https://discord.gg/rGvu9hKffJ).
  - type: input
    attributes:
      label: What version did the issue occur in?
      description: You can find the version by opening the changelog in-game and looking at the bottom right corner of the changelog window.
      placeholder: honksquad/aa1337b
    validations:
      required: false
  - type: textarea
    attributes:
      label: Description
      description: |
        A clear and concise description of what the issue is.
        If the issue is visual in nature, consider posting a screenshot.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
      description: List the steps required to reproduce the issue.
      placeholder: |
        1.
        2.
        3.
        ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional Context
      description: Add any other additional context about the issue here.
    validations:
      required: false

