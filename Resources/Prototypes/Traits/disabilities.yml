# If you add a new trait, make sure to add the corresponding component to the whitelist in \Resources\Prototypes\Entities\Mobs\Player\clone.yml so it gets copied to clones correctly!

- type: trait
  id: Blindness
  name: trait-blindness-name
  description: trait-blindness-desc
  traitGear: WhiteCane
  category: Disabilities
  # HONK START - Cost + tag-based exclusion
  cost: -8
  tags:
  - sight
  excludedTags:
  - sight
  # HONK END
  whitelist:
    components:
      - Blindable
  components:
    - type: PermanentBlindness

- type: trait
  id: PoorVision
  name: trait-poor-vision-name
  description: trait-poor-vision-desc
  traitGear: ClothingEyesGlasses
  category: Disabilities
  # HONK START - Cost + tag-based exclusion
  cost: -2
  tags:
  - sight
  excludedTags:
  - sight
  # HONK END
  whitelist:
    components:
      - Blindable
  components:
    - type: PermanentBlindness
      blindness: 4

- type: trait
  id: Narcolepsy
  name: trait-narcolepsy-name
  description: trait-narcolepsy-desc
  category: Disabilities
  cost: -4 # HONK
  components:
    - type: Narcolepsy
      maxTimeBetweenIncidents: 600
      minTimeBetweenIncidents: 300
      maxDurationOfIncident: 30
      minDurationOfIncident: 10

- type: trait
  id: Unrevivable
  name: trait-unrevivable-name
  description: trait-unrevivable-desc
  category: Disabilities
  cost: -4 # HONK
  components:
    - type: Unrevivable
      cloneable: true

- type: trait
  id: Monochromacy
  name: trait-monochromacy-name
  description: trait-monochromacy-desc
  category: Disabilities
  # HONK START - Cost + tag-based exclusion (shares sight domain)
  cost: -1
  tags:
  - sight
  excludedTags:
  - sight
  # HONK END
  components:
  - type: BlackAndWhiteOverlay

- type: trait
  id: Muted
  name: trait-muted-name
  description: trait-muted-desc
  category: Disabilities
  # HONK START - Cost + tag-based exclusion (silences all speech)
  cost: -4
  tags:
  - speech
  excludedTags:
  - speech
  # HONK END
  blacklist:
    components:
      - BorgChassis
  components:
    - type: Muted

- type: trait
  id: Paracusia
  name: trait-paracusia-name
  description: trait-paracusia-desc
  category: Disabilities
  cost: -1 # HONK
  components:
    - type: Paracusia
      minTimeBetweenIncidents: 0.1
      maxTimeBetweenIncidents: 300
      maxSoundDistance: 7
      sounds:
        collection: Paracusia

- type: trait
  id: PainNumbness
  name: trait-painnumbness-name
  description: trait-painnumbness-desc
  category: Disabilities
  # HONK START - Cost + tag-based exclusion (perception trait, opposite of SelfAware)
  cost: -2
  tags:
  - awareness
  excludedTags:
  - awareness
  # HONK END
  specials:
  - !type:ApplyStatusEffectSpecial
    statusEffects:
    - PainNumbnessTraitStatusEffect

- type: trait
  id: Hemophilia
  name: trait-hemophilia-name
  description: trait-hemophilia-desc
  category: Disabilities
  cost: -2 # HONK
  specials:
  - !type:ApplyStatusEffectSpecial
    statusEffects:
    - StatusEffectHemophiliaTrait

- type: trait
  id: ImpairedMobility
  name: trait-impaired-mobility-name
  description: trait-impaired-mobility-desc
  traitGear: OffsetCane
  category: Disabilities
  # HONK START - Cost + tag-based exclusion (broad mobility marker, blocks sprint-dependent traits)
  cost: -4
  tags:
  - mobility
  excludedTags:
  - sprint
  # HONK END
  components:
    - type: ImpairedMobility
