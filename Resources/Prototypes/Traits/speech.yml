# If you add a new trait, make sure to add the corresponding component to the whitelist in \Resources\Prototypes\Entities\Mobs\Player\clone.yml so it gets copied to clones correctly!

# Free

- type: trait
  id: Accentless
  name: trait-accentless-name
  description: trait-accentless-desc
  category: SpeechTraits
  cost: 2
  # HONK START - #634: species-aware Accentless. Per-species strip lists instead of one flat list.
  speciesWhitelist: [ Reptilian, Moth, Dwarf, Skeleton ]
  descriptionOverrides:
    Reptilian: trait-accentless-desc-reptilian
    Moth: trait-accentless-desc-moth
    Dwarf: trait-accentless-desc-dwarf
    Skeleton: trait-accentless-desc-skeleton
  # HONK END
  components:
  - type: Accentless
    # HONK START - #634
    speciesEffects:
      Reptilian:
        strips:
        - type: LizardAccent
      Moth:
        strips:
        - type: MothAccent
      Dwarf:
        stripsReplacementAccents: [ scottish ]
      Skeleton:
        strips:
        - type: SkeletonAccent
    # HONK END

