  effects:
  - !type:AmmoniaOxygenReaction {}

- type: gasReaction
  id: N2ODecomposition
  priority: 0
  minimumTemperature: 850
  minimumRequirements:
    NitrousOxide: 0.01
  effects:
  - !type:N2ODecompositionReaction {}

