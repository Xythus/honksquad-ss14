- type: gas
  id: Pluoxium
  name: gas-pluoxium
  abbreviation: gas-pluoxium-abbreviation
  molarHeatCapacity: 80
  heatCapacityRatio: 1.4
  molarMass: 46
  color: "#7b68ee"
  reagent: Pluoxium
  pricePerMole: 0.5

- type: gasReaction
  id: PluoxiumFormation
  priority: 4
  minimumTemperature: 50
  maximumTemperature: 273 # Atmospherics.PluoxiumFormationMaxTemp
  minimumRequirements:
    CarbonDioxide: 0.01
    Oxygen: 0.5
    Tritium: 0.01
  effects:
    - !type:PluoxiumFormationReaction {}

- type: reagent
  id: Pluoxium
  name: reagent-name-pluoxium
  desc: reagent-desc-pluoxium
  physicalDesc: reagent-physical-desc-gaseous
  flavor: metallic
  color: "#7b68ee"
  metabolisms:
    Bloodstream:
      effects:
        - !type:Oxygenate
          factor: 8
          conditions:
            - !type:MetabolizerTypeCondition
              type: [Human, Animal, Rat, Plant, Arachnid, Moth]
        - !type:ModifyLungGas
          ratios:
            CarbonDioxide: 1.0
            Pluoxium: -1.0
    Respiration:
      effects:
        - !type:Oxygenate
          factor: 8
          conditions:
            - !type:MetabolizerTypeCondition
              type: [Human, Animal, Rat, Plant, Arachnid, Moth]
