# Lowpop midround event overrides for ~10-15 player servers.
# These inherit from upstream events and only lower minimumPlayers thresholds.

# === Calm events ===

- type: entity
  parent: AnomalySpawn
  id: LowpopAnomalySpawn
  components:
    - type: StationEvent
      startAnnouncementColor: "#18abf5"
      startAudio:
        path: /Audio/Announcements/announce.ogg
      weight: 8
      duration: 35
      reoccurrenceDelay: 20

- type: entity
  parent: BluespaceArtifact
  id: LowpopBluespaceArtifact
  components:
    - type: StationEvent
      startAnnouncementColor: "#18abf5"
      startAudio:
        path: /Audio/Announcements/announce.ogg
      weight: 8
      duration: 35
      reoccurrenceDelay: 20

- type: entity
  parent: GasLeak
  id: LowpopGasLeak
  components:
    - type: StationEvent
      startAnnouncement: station-event-gas-leak-start-announcement
      startAudio:
        path: /Audio/Announcements/attention.ogg
      endAnnouncement: station-event-gas-leak-end-announcement
      weight: 8
      reoccurrenceDelay: 20

- type: entity
  parent: SolarFlare
  id: LowpopSolarFlare
  components:
    - type: StationEvent
      weight: 8
      startAnnouncement: station-event-solar-flare-start-announcement
      endAnnouncement: station-event-solar-flare-end-announcement
      startAudio:
        path: /Audio/Announcements/attention.ogg
      duration: 120
      maxDuration: 240
      reoccurrenceDelay: 20

- type: entity
  parent: PowerGridCheck
  id: LowpopPowerGridCheck
  components:
    - type: StationEvent
      weight: 5
      startAnnouncement: station-event-power-grid-check-start-announcement
      endAnnouncement: station-event-power-grid-check-end-announcement
      startAudio:
        path: /Audio/Announcements/power_off.ogg
        params:
          volume: -4
      duration: 60
      maxDuration: 120
      reoccurrenceDelay: 20

- type: entity
  parent: BreakerFlip
  id: LowpopBreakerFlip
  components:
    - type: StationEvent
      weight: 7
      duration: 1
      minimumPlayers: 10

- type: entity
  parent: BureaucraticError
  id: LowpopBureaucraticError
  components:
    - type: StationEvent
      startAnnouncement: station-event-bureaucratic-error-announcement
      minimumPlayers: 15
      earliestStart: 20
      weight: 6
      duration: 1

- type: entity
  parent: ClericalError
  id: LowpopClericalError
  components:
    - type: StationEvent
      startAnnouncement: station-event-clerical-error-announcement
      minimumPlayers: 10
      earliestStart: 20
      weight: 6
      duration: 1

- type: entity
  parent: KudzuGrowth
  id: LowpopKudzuGrowth
  components:
    - type: StationEvent
      earliestStart: 15
      minimumPlayers: 10

- type: entity
  parent: BluespaceLocker
  id: LowpopBluespaceLocker
  components:
    - type: StationEvent
      weight: 2
      reoccurrenceDelay: 20
      earliestStart: 15
      duration: 1

- type: entity
  parent: MimicVendorRule
  id: LowpopMimicVendorRule
  components:
    - type: StationEvent
      earliestStart: 0
      minimumPlayers: 10

- type: entity
  parent: VentClog
  id: LowpopVentClog
  components:
    - type: StationEvent
      startAnnouncement: station-event-vent-clog-start-announcement
      startAudio:
        path: /Audio/Announcements/attention.ogg
      earliestStart: 15
      minimumPlayers: 10

