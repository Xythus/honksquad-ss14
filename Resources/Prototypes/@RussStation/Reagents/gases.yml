- type: reagent
  id: Miasma
  name: reagent-name-miasma
  desc: reagent-desc-miasma
  physicalDesc: reagent-physical-desc-gaseous
  flavor: terrible
  color: "#808000"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 2

- type: reagent
  id: BZ
  name: reagent-name-bz
  desc: reagent-desc-bz
  physicalDesc: reagent-physical-desc-gaseous
  flavor: bitter
  color: "#9370db"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 1.5

- type: reagent
  id: Pluoxium
  name: reagent-name-pluoxium
  desc: reagent-desc-pluoxium
  physicalDesc: reagent-physical-desc-gaseous
  flavor: metallic
  color: "#7b68ee"
  metabolisms:
    Bloodstream:
      effects:
      - !type:Oxygenate
        factor: 8
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Human, Animal, Rat, Plant ]
      - !type:ModifyLungGas
        ratios:
          CarbonDioxide: 1.0
          Pluoxium: -1.0
    Respiration:
      effects:
      - !type:Oxygenate
        factor: 8
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Human, Animal, Rat, Plant, Arachnid, Moth ]

- type: reagent
  id: Halon
  name: reagent-name-halon
  desc: reagent-desc-halon
  physicalDesc: reagent-physical-desc-gaseous
  flavor: acrid
  color: "#800080"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Caustic: 0.5
