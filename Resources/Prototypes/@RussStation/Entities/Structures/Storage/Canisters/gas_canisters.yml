# Fork-only gas canisters.
#
# These entities parent the upstream GasCanister base and override the Sprite
# component to use the SS13 russstation RSI. The nine tier-one gases added by
# PR 365 (Hydrogen, Helium, BZ, Pluoxium, Halon, Antinoblium, Healium, Nitrium,
# ProtoNitrate) ship filled with 2769.36 moles at 293.15 K, matching the
# upstream single-gas canister convention.
#
# HyperNobliumCanister and ZaukerCanister ship filled with 2769.36 moles at
# 293.15 K, matching the other fork canisters. Destructible is inherited from
# GasCanister, so they spawn the generic GasCanisterBrokenBase when destroyed.
#
# MiasmaCanister is intentionally absent: migration.yml redirects it to
# AmmoniaCanister, and PR 365 keeps that mapping.

- type: entity
  parent: GasCanister
  id: AntinobliumCanister
  name: antinoblium canister
  description: A canister that can contain any type of gas. This one is supposed to contain antinoblium. It can be attached to connector ports using a wrench.
  components:
    - type: Sprite
      sprite: "@RussStation/Structures/Storage/canister.rsi"
      layers:
        - state: antinoblium
    - type: GasCanister
      gasMixture:
        volume: 1500
        moles:
          Antinoblium: 2769.36
        temperature: 293.15

