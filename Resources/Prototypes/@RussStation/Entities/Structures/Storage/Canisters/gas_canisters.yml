# Fork-only gas canisters staged for follow-up gas PRs.
#
# These entities parent the upstream GasCanister base and override only the
# Sprite component to point at the SS13 russstation RSI. gasMixture is empty
# (volume + temperature only) because the fork-only Gas enum values (Pluoxium,
# Halon, Antinoblium, HyperNoblium, Zauker, etc.) don't exist on release yet.
# PR 365 (feat/tier1-gases) adds the tier-one entries and fills in moles per
# canister when it merges; HyperNoblium and Zauker are staged here for a
# second gas PR. Destructible is inherited from GasCanister, so these spawn
# the generic GasCanisterBrokenBase when destroyed until those PRs wire
# per-gas broken variants.
#
# MiasmaCanister is intentionally absent: migration.yml redirects it to
# AmmoniaCanister, and PR 365 keeps that mapping.

- type: entity
  parent: GasCanister
  id: AntinobliumCanister
  name: antinoblium canister
  description: A canister that can contain any type of gas. This one is supposed to contain antinoblium. It can be attached to connector ports using a wrench.
  components:
    - type: Sprite
      sprite: "@RussStation/Structures/Storage/canister.rsi"
      layers:
        - state: antinoblium
    - type: GasCanister
      gasMixture:
        volume: 1500
        temperature: 293.15

