- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHatStrawHatRustic
  name: rustic straw hat
  description: A fancy hat for hot days! Not recommended to wear near fires.
  components:
  - type: Sprite
    sprite: '@RussStation/Clothing/Head/Hats/rustic_straw_hat.rsi'
  - type: Clothing
    sprite: '@RussStation/Clothing/Head/Hats/rustic_straw_hat.rsi'
  - type: Construction
    graph: StrawHat
    node: strawhat
  - type: Tag
    tags:
    - CorgiWearable
  - type: Flammable
    fireSpread: true
    canResistFire: false
    alwaysCombustible: true
    canExtinguish: true
    damage:
      types:
        Heat: 1
  - type: Damageable
    damageModifierSet: Wood
  - type: Appearance
  - type: FireVisuals
    sprite: Effects/fire.rsi
    normalState: fire
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
            Ash:
              min: 1
              max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

