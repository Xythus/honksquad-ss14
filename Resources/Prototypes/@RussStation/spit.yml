- type: entity
  parent: BaseAction
  id: ActionSpit
  name: "[color=blue]Spit[/color]"
  description: Spit a fat wad of phlegm at something you hate.
  components:
  - type: Action
    raiseOnUser: true
    icon: { sprite : '@RussStation/spit.rsi', state: spit }
    itemIconStyle: BigAction
    priority: 2
  - type: TargetAction
    checkCanAccess: false
    range: 0
  - type: WorldTargetAction
    event: !type:ActionGunShootEvent 

- type: entity
  categories: [ HideSpawnMenu ]
  id: SpitGun
  name: spit
  description: spit.
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 0.1
    rechargeSound: null
  - type: BasicEntityAmmoProvider
    proto: ProjectileSpit
    capacity: 1
    count: 1
  - type: Gun
    soundGunshot: /Audio/@RussStation/Spit/russstation_sound_voice_spit_release.ogg
    soundEmpty: null
    projectileSpeed: 10

- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: ProjectileSpit
  name: spit
  description: Yup, spit.
  components:
  - type: Projectile
    impactEffect: SpitImpactEffect
    damage:
      types:
        Blunt: 0
    soundHit: /Audio/@RussStation/Spit/russstation_sound_misc_waterbloop1.ogg
  - type: Sprite
    sprite: '@RussStation/spit.rsi'
    layers:
    - state: spitProjectile
      shader: unshaded
  - type: TimedDespawn
    lifetime: 0.25

- type: entity
  id: SpitImpactEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.25
  - type: Sprite
    drawdepth: Effects
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: '@RussStation/spit.rsi'
      state: impact_spit
  - type: EffectVisuals
  - type: Tag
    tags:
      - HideContextMenu