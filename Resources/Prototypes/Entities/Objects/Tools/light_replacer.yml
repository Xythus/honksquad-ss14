- type: entity
  parent: BaseItem
  name: light replacer
  id: LightReplacer
  description: An item which uses magnets to easily replace broken lights. Refill by adding more lights into the replacer.
  components:
  - type: Sprite
    sprite: Objects/Specific/Janitorial/light_replacer.rsi
    state: icon
  - type: Item
    sprite: Objects/Specific/Janitorial/light_replacer.rsi
  # HONK START - trim initial fill to 12 total so it fits under LightReplacerRecycler's MaxStoredBulbs
  - type: LightReplacer
    contents:
    - id: LightTube
      amount: 7
    - id: LightBulb
      amount: 5
  # HONK END
  - type: StaticPrice
    price: 100
  - type: ContainerContainer
    containers:
      light_replacer_storage: !type:Container
  - type: Tag
    tags:
    - LightReplacer
  # HONK START - Light replacer recycler
  - type: LightReplacerRecycler
  - type: UserInterface
    interfaces:
      enum.LightReplacerRecyclerUiKey.Key:
        type: LightReplacerRecyclerBoundUserInterface
  - type: ActivatableUI
    inHandsOnly: true
    key: enum.LightReplacerRecyclerUiKey.Key
  # HONK END

- type: entity
  parent: LightReplacer
  id: LightReplacerEmpty
  suffix: Empty
  components:
  - type: LightReplacer
    contents:
    - id: LightTube
      amount: 0
