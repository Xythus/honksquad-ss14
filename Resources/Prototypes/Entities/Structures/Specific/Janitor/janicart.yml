# Mop Bucket
- type: entity
  name: mop bucket
  id: MopBucket
  parent: [BaseStructureDynamic, StructureWheeled]
  description: Holds water and the tears of the janitor.
  components:
  - type: Clickable
  - type: Sprite
    sprite: Objects/Specific/Janitorial/janitorial.rsi
    noRot: true
    layers:
    - state: mopbucket
    - state: mopbucket_water-1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    drawdepth: Objects
  - type: InteractionOutline
  - type: SolutionContainerManager
    solutions:
      bucket:
        maxVol: 600
  - type: Spillable
    solution: bucket
    spillDelay: 3.0
    spillWhenThrown: false
  - type: DrainableSolution
    solution: bucket
  - type: RefillableSolution
    solution: bucket
  - type: ExaminableSolution
    solution: bucket
  - type: ItemMapper
    mapLayers:
      mopbucket_shark_blue:
        whitelist:
          tags:
            - PlushieSharkBlue
      mopbucket_shark_pink:
        whitelist:
          tags:
            - PlushieSharkPink
      mopbucket_shark_grey:
        whitelist:
          tags:
            - PlushieSharkGrey
      mopbucket_carpplush:
        whitelist:
          tags:
            - PlushieCarp
      mopbucket_magicarpplush:
        whitelist:
          tags:
          - PlushieCarpMagi
      mopbucket_holocarpplush:
        whitelist:
          tags:
          - PlushieCarpHolo
    sprite: Objects/Specific/Janitorial/janitorial.rsi
  - type: Transform
    noRot: true
  - type: ItemSlots
    slots:
      item_slot:
        name: mop-bucket-slot-component-slot-name-item
        ejectVerbText: mop-bucket-slot-component-eject-verb
        whitelist:
          tags:
            - PlushieSharkBlue
            - PlushieSharkPink
            - PlushieSharkGrey
            - PlushieCarp
            - PlushieCarpHolo
            - PlushieCarpMagi
          components:
            - Rehydratable
        priority: 3 # Higher than drinking priority
  - type: ReactiveContainer
    solution: bucket
    container: item_slot
  - type: Edible
    edible: Drink
    solution: bucket
    destroyOnEmpty: false
    utensil: Spoon
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: mopbucket_water-
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      item_slot: !type:ContainerSlot {}
  - type: GuideHelp
    guides:
    - Janitorial
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 70
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: DnaSubstanceTrace
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 60
        mask:
        - MachineMask

- type: entity
  name: mop bucket
  id: MopBucketFull
  parent: MopBucket
  suffix: full
  components:
  - type: Sprite
    layers:
    - state: mopbucket
    - state: mopbucket_water-3
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: SolutionContainerManager
    solutions:
      bucket:
        maxVol: 600
        reagents:
        - ReagentId: Water
          Quantity: 600

- type: entity
  parent: BaseWrappedCube
  name: mop bucket cube
  id: MopBucketCubeWrapped
  description: Unwrap this to get a mop bucket cube.
  components:
  - type: SpawnItemsOnUse
    items:
    - id: MopBucketCube
  - type: Sprite
    state: wrapper

# Janicart
- type: entity
  name: janitorial trolley
  id: JanitorialTrolley
  parent: [BaseStructureDynamic, StructureWheeled]
  description: This is the alpha and omega of sanitation.
  components:
  - type: Sprite
    noRot: true
    sprite: Objects/Specific/Janitorial/janitorial_cart.rsi
    layers:
    - state: cart
    - state: cart_water-1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Rotatable
  - type: InteractionOutline
  - type: ItemSlots
    slots:
      mop_slot:
        name: janitorial-trolley-slot-component-slot-name-mop
        whitelist:
          tags:
          - Mop
        insertOnInteract: false # or it conflicts with bucket logic
        priority: 9 # Higher than bucket slot
      plunger_slot:
        name: janitorial-trolley-slot-component-slot-name-plunger
        whitelist:
          tags:
          - Plunger
          - GoldenPlunger
        # HONK START - consistent alt-click insertion
        insertOnInteract: false
        # HONK END
        priority: 8
      wetfloorsign_slot4:
        name: janitorial-trolley-slot-component-slot-name-sign
        whitelist:
          tags:
          - WetFloorSign
        # HONK START - consistent alt-click insertion
        insertOnInteract: false
        # HONK END
        priority: 7
      wetfloorsign_slot3:
        name: janitorial-trolley-slot-component-slot-name-sign
        whitelist:
          tags:
          - WetFloorSign
        # HONK START - consistent alt-click insertion
        insertOnInteract: false
        # HONK END
        priority: 7
      wetfloorsign_slot2:
        name: janitorial-trolley-slot-component-slot-name-sign
        whitelist:
          tags:
          - WetFloorSign
        # HONK START - consistent alt-click insertion
        insertOnInteract: false
        # HONK END
        priority: 7
      wetfloorsign_slot1:
        name: janitorial-trolley-slot-component-slot-name-sign
        whitelist:
          tags:
          - WetFloorSign
        # HONK START - consistent alt-click insertion
        insertOnInteract: false
        # HONK END
        priority: 7
      lightreplacer_slot:
        name: janitorial-trolley-slot-component-slot-name-lightreplacer
        whitelist:
          components:
          - LightReplacer
        # HONK START - consistent alt-click insertion
        insertOnInteract: false
        # HONK END
        priority: 6
      spraybottle_slot:
        name: janitorial-trolley-slot-component-slot-name-spray
        whitelist:
          tags:
          - Spray
        insertOnInteract: false # or it conflicts with bucket logic
        priority: 5 # Higher than bucket slot
      bucket_slot:
        name: janitorial-trolley-slot-component-slot-name-bucket
        whitelist:
          tags:
          - Bucket
        insertOnInteract: false # or it also conflicts with bucket logic
        priority: 4 # Higher than trash bag slot
      trashbag_slot:
        name: janitorial-trolley-slot-component-slot-name-trashbag
        whitelist:
          tags:
          - TrashBag
          - TrashBagBlue
        # HONK START - consistent alt-click insertion
        insertOnInteract: false
        # HONK END
        priority: 3 # Higher than drinking priority
      # HONK START - plushie mascot slot, matches mop bucket whitelist
      plushie_slot:
        name: janitorial-trolley-slot-component-slot-name-plushie
        whitelist:
          tags:
          - PlushieCarp
          - PlushieCarpHolo
          - PlushieCarpMagi
          - PlushieSharkBlue
          - PlushieSharkGrey
          - PlushieSharkPink
        priority: 1
      # HONK END
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.3
        density: 250
        layer:
        - MobLayer
        mask:
        - MobMask
  - type: Spillable
    solution: bucket
    spillDelay: 3.0
    spillWhenThrown: false
  - type: SolutionContainerManager
    solutions:
      bucket:
        maxVol: 800
        reagents:
        - ReagentId: Water
          Quantity: 600 # 3 quarters full at roundstart to make it more appealing
  - type: DrainableSolution
    solution: bucket
  - type: RefillableSolution
    solution: bucket
  # HONK START - Allow dragging sinks/drains onto the trolley to refill the bucket.
  - type: DumpableSolution
    solution: bucket
  # HONK END
  - type: ExaminableSolution
    solution: bucket
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:EmptyAllContainersBehaviour
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: ItemMapper
    mapLayers:
      cart_plunger:
        whitelist:
          tags:
          - Plunger
      cart_goldenplunger:
        whitelist:
          tags:
          - GoldenPlunger
      cart_mop:
        whitelist:
          tags:
          - MopBasic
      cart_advmop:
        whitelist:
          tags:
          - MopAdv
      cart_garbage:
        whitelist:
          tags:
          - TrashBag
      cart_garbage_blue:
        whitelist:
          tags:
          - TrashBagBlue
      cart_replacer:
        whitelist:
          components:
          - LightReplacer
      cart_spray:
        whitelist:
          tags:
          - Spray
      cart_sign1: # this is like stack of floor signs
        minCount: 1
        whitelist:
          tags:
          - WetFloorSign
      cart_sign2:
        minCount: 2
        whitelist:
          tags:
          - WetFloorSign
      cart_sign3:
        minCount: 3
        whitelist:
          tags:
          - WetFloorSign
      cart_sign4:
        minCount: 4
        whitelist:
          tags:
          - WetFloorSign
      cart_bucket:
        whitelist:
          tags:
          - Bucket
      # HONK START - plushie mascot layers; split per-direction so each can carry its own offset
      cart_shark_blue_e:
        whitelist:
          tags:
          - PlushieSharkBlue
        offset: -0.375, 0
      cart_shark_blue_w:
        whitelist:
          tags:
          - PlushieSharkBlue
        offset: 0.375, 0
      cart_shark_blue_ns:
        whitelist:
          tags:
          - PlushieSharkBlue
      cart_magicarp_e:
        whitelist:
          tags:
          - PlushieCarpMagi
        offset: -0.25, -0.03125
      cart_magicarp_w:
        whitelist:
          tags:
          - PlushieCarpMagi
        offset: 0.25, -0.03125
      cart_magicarp_ns:
        whitelist:
          tags:
          - PlushieCarpMagi
        offset: 0, -0.03125
      cart_shark_pink_e:
        whitelist:
          tags:
          - PlushieSharkPink
        offset: -0.375, -0.03125
      cart_shark_pink_w:
        whitelist:
          tags:
          - PlushieSharkPink
        offset: 0.375, -0.03125
      cart_shark_pink_ns:
        whitelist:
          tags:
          - PlushieSharkPink
        offset: 0, -0.03125
      cart_shark_grey_e:
        whitelist:
          tags:
          - PlushieSharkGrey
        offset: -0.375, -0.03125
      cart_shark_grey_w:
        whitelist:
          tags:
          - PlushieSharkGrey
        offset: 0.375, -0.03125
      cart_shark_grey_ns:
        whitelist:
          tags:
          - PlushieSharkGrey
        offset: 0, -0.03125
      cart_carp_e:
        whitelist:
          tags:
          - PlushieCarp
        offset: -0.25, -0.03125
      cart_carp_w:
        whitelist:
          tags:
          - PlushieCarp
        offset: 0.25, -0.03125
      cart_carp_ns:
        whitelist:
          tags:
          - PlushieCarp
        offset: 0, -0.03125
      cart_holocarp_e:
        whitelist:
          tags:
          - PlushieCarpHolo
        offset: -0.25, -0.03125
      cart_holocarp_w:
        whitelist:
          tags:
          - PlushieCarpHolo
        offset: 0.25, -0.03125
      cart_holocarp_ns:
        whitelist:
          tags:
          - PlushieCarpHolo
        offset: 0, -0.03125
      # HONK END
    sprite: Objects/Specific/Janitorial/janitorial_cart.rsi
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: cart_water-
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      # HONK START - Radial eject menu for quick item removal
      enum.ItemSlotEjectMenuUiKey.Key:
        type: ItemSlotEjectMenuBoundUserInterface
      # HONK END
  - type: Edible
    edible: Drink
    solution: bucket
    destroyOnEmpty: false
    utensil: Spoon
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      mop_slot: !type:ContainerSlot {}
      trashbag_slot: !type:ContainerSlot {}
      bucket_slot: !type:ContainerSlot {}
      plunger_slot: !type:ContainerSlot {}
      goldenplunger_slot: !type:ContainerSlot {}
      wetfloorsign_slot4: !type:ContainerSlot {}
      wetfloorsign_slot3: !type:ContainerSlot {}
      wetfloorsign_slot2: !type:ContainerSlot {}
      wetfloorsign_slot1: !type:ContainerSlot {}
      lightreplacer_slot: !type:ContainerSlot {}
      spraybottle_slot:  !type:ContainerSlot {}
      # HONK START - plushie mascot slot container
      plushie_slot: !type:ContainerSlot {}
      # HONK END
  # HONK START - Empty-hand eject + alt-click radial eject menu
  - type: ItemSlotEjectMenu
  # HONK END
  # HONK START - Left-click inserts into trash bag if item doesn't fit a trolley slot
  - type: JanitorialTrolley
  # HONK END
  # HONK START - Skip upstream's "slots are full, can't drink" popup on the trolley bucket
  - type: IgnoreItemSlotsEdibleBlock
  # HONK END
  - type: GuideHelp
    guides:
    - Janitorial
  - type: DnaSubstanceTrace
