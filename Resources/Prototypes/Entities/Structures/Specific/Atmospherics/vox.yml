- type: entity
  abstract: true
  parent: AirSensorBase
  id: AirSensorVoxBase
  suffix: Vox Atmosphere
  components:
  - type: AtmosMonitor
    gasThresholdPrototypes:
      Oxygen: voxOxygen
      Nitrogen: voxNitrogen
      CarbonDioxide: stationCO2
      Plasma: stationPlasma
      Tritium: stationTritium
      WaterVapor: stationWaterVapor
      Ammonia: stationAmmonia
      NitrousOxide: stationNO
      Frezon: danger
      # HONK START - fork gases default to danger so the air alarm UI has thresholds for every Gas enum value
      Hydrogen: danger
      Helium: danger
      BZ: danger
      Pluoxium: danger
      Halon: danger
      Antinoblium: danger
      Healium: danger
      Nitrium: danger
      ProtoNitrate: danger
      # HONK END

- type: entity
  parent: [AirSensorVoxBase, AirSensor]
  id: AirSensorVox

- type: entity
  parent: [AirSensorVoxBase, GasVentPump]
  id: GasVentPumpVox

- type: entity
  parent: [AirSensorVoxBase, GasVentScrubber]
  id: GasVentScrubberVox
  components:
  - type: GasVentScrubber
    wideNet: true # Air alarm with auto mode overrides filters with hardcoded defaults so default to widenet
    filterGases:
    - Oxygen # filter out oxygen as well as regular harmful gases
    - CarbonDioxide
    - Plasma
    - Tritium
    - WaterVapor
    - Ammonia
    - NitrousOxide
    - Frezon
    # HONK START - fork gases, scrubbed out of vox atmospheres alongside the vanilla dangerous gases
    - Hydrogen
    - Helium
    - BZ
    - Pluoxium
    - Halon
    - Antinoblium
    - Healium
    - Nitrium
    - ProtoNitrate
    # HONK END

# use this to prevent overriding filters with hardcoded defaults
- type: entity
  parent: AirAlarm
  id: AirAlarmVox
  suffix: Vox Atmosphere, auto mode disabled
  components:
  - type: AirAlarm
    autoMode: false
